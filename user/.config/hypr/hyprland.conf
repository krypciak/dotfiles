################
### MONITORS ###
################

monitor=,preferred,auto,auto
# monitorv2 {
#   output = HDMI-A-2
#   mode = 2560x1440@144
# }

###################
### MY PROGRAMS ###
###################

$terminal = alacritty
$menu = fuzzel --width 30 --log-level=none
$bar_run = waybar
$bar_kill = pkill waybar
$cliphist_menu = ~/.config/scripts/cliphist-fuzzel.sh
$lock = swaylock
$wallpaper = luajit ~/.config/wallpapers/wallpaper.lua
$music = alacritty --class cmus --title cmus -e cmus
$clipboard_manager = wl-paste --watch cliphist -max-items 30000 store
$mail = tutanota-desktop --enable-features=UseOzonePlatform --ozone-platform=wayland
$browser = librewolf

#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = awww-daemon
exec-once = sleep 0.3; $wallpaper inc 0 0
exec-once = gammastep -r
exec-once = $bar_run
exec-once = $clipboard_manager
# exec-once = amixer set Capture nocap > /dev/null 2>&1
exec-once = fnott
exec-once = pgrep keepassxc || keepassxc --platformtheme qt5ct
# exec-once = sleep 15; pgrep tutanota || $mail
# exec-once = blueman-applet
exec-once = safeeyes

exec-once = fcitx5 -d

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,breeze_cursors
env = HYPRCURSOR_SIZE,24

env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
# env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = XMODIFIERS,'@im=fcitx'
env = SDL_IM_MODULE,'fcitx'
env = QT_IM_MODULES,"wayland;fcitx;ibus"


###################
### PERMISSIONS ###
###################

ecosystem {
  enforce_permissions = 1
}

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpicker, screencopy, allow
permission = /usr/(bin|local/bin)/wayvnc, screencopy, allow
permission = /usr/(bin|local/bin)/wayvnc, cursorpos, allow

#####################
### LOOK AND FEEL ###
#####################

$inactive_border_color = rgba(1d1f21ff)
general {
    gaps_in = 0
    gaps_out = 0

    border_size = 1

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = $inactive_border_color

    resize_on_border = false

    allow_tearing = false
}

decoration {
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

# inactive border color when only one window
windowrule = border_color $inactive_border_color, match:float 0, match:workspace w[tv1]
windowrule = border_color $inactive_border_color, match:float 0, match:workspace [1]

#############
### INPUT ###
#############

input {
    kb_layout = pl,us
    kb_variant =
    kb_model =
    kb_options = caps:shiftlock
    kb_rules =

    follow_mouse = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }

    repeat_rate = 50
    repeat_delay =  200
}

cursor {
    inactive_timeout = 2
    no_warps = true
    hide_on_key_press = true
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
# device {
#     name = epic-mouse-v1
#     sensitivity = -0.5
# }

##################
### WORKSPACES ###
##################

workspace = 6,  on-created-empty: webcord
workspace = 7,  on-created-empty: $browser
workspace = 9,  on-created-empty: $mail
workspace = 5,  on-created-empty: $music
workspace = 5,
workspace = 8,
workspace = 8,
workspace = 8,
workspace = 11,
workspace = 11,

bind = ALT, Tab, workspace, 1
bind = ALT, Q,   workspace, 2
bind = ALT, W,   workspace, 3
bind = ALT, E,   workspace, 4
bind = ALT, N,   workspace, 5
bind = ALT, D,   workspace, 6
bind = ALT, S,   workspace, 7
bind = ALT, A,   workspace, 8
bind = ALT, Z,   workspace, 9
bind = ALT, C,   workspace, 10
bind = ALT, H,   workspace, 11

bind = ALT SHIFT, Tab, movetoworkspace, 1
bind = ALT SHIFT, Q,   movetoworkspace, 2
bind = ALT SHIFT, W,   movetoworkspace, 3
bind = ALT SHIFT, E,   movetoworkspace, 4
bind = ALT SHIFT, N,   movetoworkspace, 5
bind = ALT SHIFT, D,   movetoworkspace, 6
bind = ALT SHIFT, S,   movetoworkspace, 7
bind = ALT SHIFT, A,   movetoworkspace, 8
bind = ALT SHIFT, Z,   movetoworkspace, 9
bind = ALT SHIFT, C,   movetoworkspace, 10
bind = ALT SHIFT, H,   movetoworkspace, 11

windowrule = match:class ^(discord|WebCord)$, workspace 6
windowrule = match:title Discord Updater, center on
windowrule = match:class ^(LibreWolf|librewolf|chromium)$, workspace 7
windowrule = match:class ^(tutanota-desktop|aerc)$, workspace 9
windowrule = match:class ^(cmus|spotube)$, workspace 5
windowrule = match:class ^(prismlauncher|Minecraft.*|steam_app_960090)$, workspace 8
windowrule = match:class ^(MonkeyCity-Win.exe|dontstarve_steam_x64)$, workspace 8
windowrule = match:title ^(.*CrossCode.*|Alabaster Dawn|.*DevTools.*)$, workspace 8
windowrule = match:class ^(Lutris|steam_app_489830)$, workspace 11
windowrule = match:title ^(.*Steam.*|Launching...)$, workspace 11

###################
### KEYBINDINGS ###
###################

# Spawn
bind = ALT, RETURN, exec, $terminal
bind = ALT, R, exec, $menu

# Power options
bindl = SUPER SHIFT CONTROL, Q, exec, hyprctl dispatch exit
bindl = SUPER SHIFT CONTROL, P, exec, ~/.config/scripts/poweroff.sh
bindl = SUPER SHIFT CONTROL, R, exec, ~/.config/scripts/reboot.sh
bindl = SUPER SHIFT CONTROL, T, exec, ~/.config/scripts/soft-reboot.sh
bindl = SUPER SHIFT CONTROL, W, exec, doas grub-reboot 2 && ~/.config/scripts/reboot.sh
bindl = SUPER SHIFT CONTROL, S, exec, playerctl pause -a; ~/.config/scripts/suspend.sh; $lock
bindl = SUPER SHIFT CONTROL, H, exec, ~/.config/scripts/hibernate.sh; if [[ ! -f /etc/encrypted ]]; then $lock; fi

bind = SUPER SHIFT CONTROL, L, exec, playerctl pause -a; $lock
bind = SUPER SHIFT CONTROL, M, exec, hyprctl reload

# Client manipulation
bind = SUPER SHIFT, C, killactive,
bind = SUPER CONTROL, Space, togglefloating
bind = SUPER, F, fullscreen, 0
bind = SUPER, M, fullscreen, 1 # Maximize window

binde = SUPER CONTROL, H, resizeactive, -60 0
binde = SUPER CONTROL, J, resizeactive, 0 60
binde = SUPER CONTROL, K, resizeactive, 0 -60
binde = SUPER CONTROL, L, resizeactive, 60 0

# Focus manipulation
bind = SUPER CONTROL, Return, layoutmsg, swapwithmaster
bind = SUPER, J, layoutmsg, cyclenext
bind = SUPER, K, layoutmsg, cycleprev
bind = SUPER SHIFT, J, layoutmsg, swapnext
bind = SUPER SHIFT, K, layoutmsg, swapprev

# Layout manipulation
bind = SUPER, H, layoutmsg, mfact -0.05
bind = SUPER, L, layoutmsg, mfact +0.05
bind = SUPER SHIFT, H, layoutmsg, addmaster
bind = SUPER SHIFT, L, layoutmsg, removemaster

bind = ALT, period, focusmonitor, r
bind = ALT, comma, focusmonitor, l

bind = ALT SHIFT, period, movewindow, mon:r
bind = ALT SHIFT, comma, movewindow, mon:l

# Playerctl
$playerctl_script=~/.config/scripts/mediaplayer.sh

bindl = ALT, J,          exec, playerctl play-pause
bindl = ALT, U,          exec, playerctl next
bindl = ALT, M,          exec, playerctl previous
bindl = ALT, I,          exec, playerctl volume 0.02%
bindl = ALT, K,          exec, playerctl volume 0.02%-

bindl = MOD3, Tab,       exec, playerctl play-pause
bindl = MOD3, Q,         exec, playerctl next
bindl = MOD3, A,         exec, playerctl previous
bindl = MOD3, W,         exec, playerctl volume 0.02%
bindl = MOD3, S,         exec, playerctl volume 0.02%-

bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Misc caps keys
bind = MOD3, 1, exec, $cliphist_menu
bind = ALT, G, exec, $cliphist_menu
bind = ALT, Y, exec, ~/.config/scripts/pipewire-audio-source.sh
bind = MOD3 CONTROL, 1, exec, cliphist wipe
bind = MOD3, 3, exec, ~/.config/scripts/wayland/togglemonitors.sh; $bar_kill; $bar_run
bind = MOD3, 4, exec, ~/.config/scripts/wayland/change-res.sh

bind = MOD3, T, exec, $wallpaper wayland-gui
bind = MOD3, Z, exec, grim - | wl-copy
bind = MOD3, C, exec, grim -g "$(slurp)" - | wl-copy
bind = MOD3, X, exec, hyprpicker | wl-copy

# Laptop multimedia keys for volume and LCD brightness
bind   = , XF86MonBrightnessUp, exec, brightnessctl -q s +10%
bind   = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind   = , XF86Lock, exec, $lock
bindl  = , XF86Poweroff, exec, ~/.config/scripts/poweroff.sh

bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10-

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bindm = SUPER, mouse:274, togglefloating

# Example special workspace (scratchpad)
# bind = ALT, S, togglespecialworkspace, magic
# bind = ALT SHIFT, S, movetoworkspace, special:magic

###############
### LAYOUTS ###
###############

general {
    layout = master
}

master {
    mfact = 0.5
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    middle_click_paste = false
    enable_swallow = true
    swallow_regex = ^(a|A)lacritty$
    background_color = rgb(000000)
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}
